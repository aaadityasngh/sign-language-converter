<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SignSpeak — Text to Sign Language</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div class="noise"></div>

  <!-- Header -->
  <header class="header">
    <div class="logo">
      <span class="logo-icon">🤟</span>
      <span class="logo-text">SignSpeak</span>
    </div>
    <button class="theme-btn" id="themeBtn" title="Toggle theme">
      <span id="themeIcon">☀️</span>
    </button>
  </header>

  <!-- Hero -->
  <main class="main">
    <section class="hero">
      <div class="badge">American Sign Language</div>
      <h1 class="hero-title">
        Type it.<br />
        <span class="accent">Sign it.</span>
      </h1>
      <p class="hero-sub">Convert any text into ASL hand signs instantly.</p>
    </section>

    <!-- Input Section -->
    <section class="input-section">
      <div class="input-card">
        <div class="input-row">
          <textarea
            id="textInput"
            class="text-input"
            placeholder="Type something... e.g. HELLO WORLD"
            maxlength="100"
            spellcheck="false"
            autocomplete="off"
          ></textarea>
          <div class="input-meta">
            <span class="char-count"><span id="charNum">0</span>/100</span>
            <div class="input-btns">
              <button class="mic-btn" id="micBtn" title="Voice input">🎙️</button>
              <button class="clear-btn" id="clearBtn">Clear</button>
              <button class="convert-btn" id="convertBtn">Convert →</button>
            </div>
          </div>
        </div>
      </div>
    </section>

    <!-- Signs Display -->
    <section class="signs-section" id="signsSection" style="display:none;">
      <div class="signs-header">
        <h2 class="signs-title">Sign Output</h2>
        <button class="download-btn" id="downloadBtn">⬇ Download</button>
      </div>
      <div class="signs-grid" id="signsGrid"></div>
    </section>

    <!-- Empty State -->
    <div class="empty-state" id="emptyState">
      <div class="empty-icon">👆</div>
      <p>Type something above and hit Convert</p>
    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script src="js/app.js"></script>
</body>
</html>
